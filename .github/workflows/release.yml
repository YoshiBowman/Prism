name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenjp2-tools rpm

      - name: Build macOS (signed + notarized)
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK:                    ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD:            ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --config electron-builder.config.js --publish never

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --config electron-builder.config.js --publish never

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --config electron-builder.config.js --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Bundle Companion module
        # Companion 4.x module import has two steps:
        #   St()   - finds companion/manifest.json by stripping the first
        #            directory prefix (set when the FIRST tar entry has
        #            type="directory").
        #   #Cc()  - extracts the tar with strip:1, removing that same prefix.
        # Both steps require a package/ directory entry as the first entry.
        # npm pack never emits that entry, so we build the tgz manually.
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 - <<'PYEOF'
import tarfile, os, sys

version = os.environ.get('GITHUB_REF_NAME', 'v0').lstrip('v')
base = 'companion-module'
out  = f'dist/companion-module-prism-{version}.tgz'

with tarfile.open(out, 'w:gz') as tar:
    # Explicit package/ directory entry MUST come first
    di = tarfile.TarInfo(name='package/')
    di.type = tarfile.DIRTYPE
    di.mode = 0o755
    tar.addfile(di)
    for arcname, filepath in [
        ('package/main.js',                os.path.join(base, 'main.js')),
        ('package/companion/manifest.json', os.path.join(base, 'companion/manifest.json')),
        ('package/package.json',            os.path.join(base, 'package.json')),
    ]:
        tar.add(filepath, arcname=arcname)

print('Bundled:', out)
PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prism</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: #f1f5f9;
      user-select: none;
      -webkit-app-region: no-drag;
      overflow: hidden;
      height: 195px;
    }

    .popover {
      margin: 8px;
      background: rgba(14, 18, 32, 0.93);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 14px;
      padding: 16px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.55),
        0 2px 8px  rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      flex-shrink: 0;
      margin-top: 4px;
      transition: background 300ms ease, box-shadow 300ms ease;
    }
    .dot.running {
      background: #34d399;
      box-shadow: 0 0 7px rgba(52, 211, 153, 0.75);
    }

    .status-info { flex: 1; min-width: 0; }

    .status-text {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
    }

    .protocol-hint {
      font-size: 11px;
      color: rgba(241, 245, 249, 0.4);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1;
      height: 32px;
      border: none;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 150ms ease, transform 150ms ease, background 150ms ease;
    }
    .btn:disabled { opacity: 0.32; cursor: not-allowed; }
    .btn:not(:disabled):active { transform: scale(0.96); }

    .btn-start {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }
    .btn-start:not(:disabled):hover { background: linear-gradient(135deg, #a78bfa, #7c3aed); }

    .btn-stop {
      background: rgba(255, 255, 255, 0.07);
      color: rgba(241, 245, 249, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 100px;
    }
    .btn-stop:not(:disabled):hover { background: rgba(255, 255, 255, 0.12); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin-bottom: 12px;
    }

    /* ── Footer row ── */
    .footer-row {
      display: flex;
      gap: 8px;
    }

    .btn-open {
      flex: 1;
      height: 28px;
      background: transparent;
      color: rgba(241, 245, 249, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
    }
    .btn-open:hover {
      background: rgba(255, 255, 255, 0.07);
      color: rgba(241, 245, 249, 0.9);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .btn-quit {
      height: 28px;
      padding: 0 14px;
      background: transparent;
      color: rgba(241, 245, 249, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
    }
    .btn-quit:hover {
      background: rgba(248, 113, 113, 0.1);
      color: #f87171;
      border-color: rgba(248, 113, 113, 0.25);
    }
  </style>
</head>
<body>
  <div class="popover">

    <div class="status-row">
      <div class="dot" id="status-dot"></div>
      <div class="status-info">
        <div class="status-text" id="status-text">Stopped</div>
        <div class="protocol-hint" id="protocol-hint"></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-start" id="btn-start">Start</button>
      <button class="btn btn-stop"  id="btn-stop" disabled>Stop</button>
    </div>

    <div class="divider"></div>

    <div class="footer-row">
      <button class="btn-open" id="btn-open">Open Prism</button>
      <button class="btn-quit" id="btn-quit">Quit</button>
    </div>

  </div>

  <script src="popover.js"></script>
</body>
</html>
